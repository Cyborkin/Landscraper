---
- name: Deploy Landscraper to Docker Swarm
  hosts: swarm_manager
  tasks:
    - name: Pull latest image
      community.docker.docker_image:
        name: "{{ registry }}/landscraper:{{ landscraper_tag }}"
        source: pull
        force_source: true

    - name: Copy compose file
      ansible.builtin.copy:
        src: ../docker/docker-compose.prod.yml
        dest: /opt/landscraper/docker-compose.prod.yml
        mode: "0644"

    - name: Deploy stack
      community.docker.docker_stack:
        name: landscraper
        compose:
          - /opt/landscraper/docker-compose.prod.yml
        state: present
      environment:
        REGISTRY: "{{ registry }}"
        TAG: "{{ landscraper_tag }}"
        POSTGRES_PASSWORD: "{{ postgres_password | default('landscraper') }}"
        LANDSCRAPER_ANTHROPIC_API_KEY: "{{ anthropic_api_key | default('') }}"

    - name: Run database migrations
      community.docker.docker_container:
        name: landscraper-migrate
        image: "{{ registry }}/landscraper:{{ landscraper_tag }}"
        command: alembic upgrade head
        networks:
          - name: landscraper_default
        env:
          LANDSCRAPER_DATABASE_URL: "postgresql+asyncpg://landscraper:{{ postgres_password | default('landscraper') }}@postgres:5432/landscraper"
        auto_remove: true
        state: started
