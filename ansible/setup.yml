---
- name: Setup swarm1 — Docker, NVIDIA drivers, Ollama
  hosts: swarm1
  become: true
  tasks:
    # ── System basics ──────────────────────────────────────────────
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install prerequisites
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - pciutils
          - "linux-headers-{{ ansible_facts['kernel'] }}"
        state: present

    # ── NVIDIA GPU drivers (Debian) ────────────────────────────────
    - name: Detect NVIDIA GPU
      ansible.builtin.shell: lspci | grep -i nvidia
      register: nvidia_check
      changed_when: false
      failed_when: false

    - name: Enable contrib and non-free repos for NVIDIA drivers
      ansible.builtin.replace:
        path: /etc/apt/sources.list
        regexp: '(deb\s+http://deb\.debian\.org/debian/?\s+trixie\s+)main.*'
        replace: '\1main contrib non-free non-free-firmware'
      when: nvidia_check.rc == 0
      register: nonfree_added

    - name: Enable contrib and non-free for security repo
      ansible.builtin.replace:
        path: /etc/apt/sources.list
        regexp: '(deb\s+http://security\.debian\.org/debian-security\s+trixie-security\s+)main.*'
        replace: '\1main contrib non-free non-free-firmware'
      when: nvidia_check.rc == 0

    - name: Update apt after adding non-free
      ansible.builtin.apt:
        update_cache: true
      when: nonfree_added is changed

    - name: Install NVIDIA driver and CUDA toolkit
      ansible.builtin.apt:
        name:
          - nvidia-driver
          - nvidia-cuda-toolkit
        state: present
      when: nvidia_check.rc == 0
      register: nvidia_install

    - name: Install NVIDIA Container Toolkit key
      ansible.builtin.shell: |
        curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | \
          gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
      args:
        creates: /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
      when: nvidia_check.rc == 0

    - name: Add NVIDIA Container Toolkit repo
      ansible.builtin.shell: |
        curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | \
          sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' | \
          tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
      args:
        creates: /etc/apt/sources.list.d/nvidia-container-toolkit.list
      when: nvidia_check.rc == 0

    - name: Install NVIDIA Container Toolkit
      ansible.builtin.apt:
        name: nvidia-container-toolkit
        state: present
        update_cache: true
      when: nvidia_check.rc == 0

    - name: Configure NVIDIA Container Toolkit for Docker
      ansible.builtin.command: nvidia-ctk runtime configure --runtime=docker
      when: nvidia_check.rc == 0
      changed_when: true

    # ── Docker ─────────────────────────────────────────────────────
    - name: Add Docker GPG key
      ansible.builtin.shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc
      args:
        creates: /etc/apt/keyrings/docker.asc

    - name: Add Docker repo
      ansible.builtin.shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] \
          https://download.docker.com/linux/debian $(. /etc/os-release && echo $VERSION_CODENAME) stable" | \
          tee /etc/apt/sources.list.d/docker.list
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Install Docker
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Add swarm user to docker group
      ansible.builtin.user:
        name: swarm
        groups: docker
        append: true

    - name: Enable and start Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Configure Docker daemon (insecure registry + NVIDIA runtime)
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "insecure-registries": ["192.168.0.111:5000"],
            "default-runtime": "nvidia",
            "runtimes": {
              "nvidia": {
                "path": "nvidia-container-runtime",
                "runtimeArgs": []
              }
            }
          }
        mode: "0644"
      notify: Restart Docker
      when: nvidia_check.rc == 0

    - name: Configure Docker daemon (insecure registry, no GPU)
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "insecure-registries": ["192.168.0.111:5000"]
          }
        mode: "0644"
      notify: Restart Docker
      when: nvidia_check.rc != 0

    # ── Docker Registry ────────────────────────────────────────────
    - name: Start local Docker registry
      community.docker.docker_container:
        name: registry
        image: registry:2
        state: started
        restart_policy: always
        ports:
          - "5000:5000"
        volumes:
          - registry_data:/var/lib/registry

    # ── Ollama ─────────────────────────────────────────────────────
    - name: Install Ollama
      ansible.builtin.shell: curl -fsSL https://ollama.com/install.sh | sh
      args:
        creates: /usr/local/bin/ollama

    - name: Create Ollama systemd override for host binding
      ansible.builtin.file:
        path: /etc/systemd/system/ollama.service.d
        state: directory
        mode: "0755"

    - name: Configure Ollama to listen on all interfaces
      ansible.builtin.copy:
        dest: /etc/systemd/system/ollama.service.d/override.conf
        content: |
          [Service]
          Environment="OLLAMA_HOST=0.0.0.0"
        mode: "0644"
      notify: Restart Ollama

    - name: Enable and start Ollama
      ansible.builtin.systemd:
        name: ollama
        enabled: true
        state: started
        daemon_reload: true

    - name: Wait for Ollama to be ready
      ansible.builtin.uri:
        url: "http://localhost:11434/api/tags"
        status_code: 200
      register: ollama_health
      retries: 10
      delay: 3
      until: ollama_health.status == 200

    - name: Pull Qwen 2.5 7B model (fits 12GB RTX 3060)
      ansible.builtin.command: ollama pull qwen2.5:7b
      register: ollama_pull
      changed_when: "'pulling' in ollama_pull.stderr | default('')"
      timeout: 600

    # ── App directory ──────────────────────────────────────────────
    - name: Create app directory
      ansible.builtin.file:
        path: /opt/landscraper
        state: directory
        owner: swarm
        group: swarm
        mode: "0755"

    # ── Reboot if NVIDIA driver was installed ──────────────────────
    - name: Reboot to load NVIDIA driver
      ansible.builtin.reboot:
        reboot_timeout: 300
      when: nvidia_install is changed

    - name: Verify NVIDIA driver loaded
      ansible.builtin.command: nvidia-smi
      register: nvidia_smi
      changed_when: false
      when: nvidia_check.rc == 0

    - name: Show GPU info
      ansible.builtin.debug:
        msg: "{{ nvidia_smi.stdout_lines }}"
      when: nvidia_check.rc == 0

  handlers:
    - name: Restart Docker
      ansible.builtin.systemd:
        name: docker
        state: restarted

    - name: Restart Ollama
      ansible.builtin.systemd:
        name: ollama
        state: restarted
        daemon_reload: true
