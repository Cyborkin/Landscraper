version: "3.8"

services:
  api:
    image: ${REGISTRY:-192.168.0.12:5000}/landscraper:${TAG:-latest}
    environment:
      LANDSCRAPER_DATABASE_URL: postgresql+asyncpg://landscraper:${POSTGRES_PASSWORD:-landscraper}@postgres:5432/landscraper
      LANDSCRAPER_REDIS_URL: redis://redis:6379/1
      LANDSCRAPER_ANTHROPIC_API_KEY: ${LANDSCRAPER_ANTHROPIC_API_KEY:-}
    networks:
      - default
      - redis_net
    ports:
      - "8000:8000"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: landscraper
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-landscraper}
      POSTGRES_DB: landscraper
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      placement:
        constraints:
          - node.role == manager
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U landscraper"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  redis_net:
    external: true
    name: iranwatch_default

volumes:
  pgdata:
