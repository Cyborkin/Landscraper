services:
  api:
    image: ${REGISTRY:-192.168.0.111:5000}/landscraper:${TAG:-latest}
    environment:
      LANDSCRAPER_DATABASE_URL: postgresql+asyncpg://landscraper:${POSTGRES_PASSWORD:-landscraper}@postgres:5432/landscraper
      LANDSCRAPER_REDIS_URL: redis://redis:6379/1
      LANDSCRAPER_ANTHROPIC_API_KEY: ${LANDSCRAPER_ANTHROPIC_API_KEY:-}
      LANDSCRAPER_OLLAMA_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: landscraper
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-landscraper}
      POSTGRES_DB: landscraper
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U landscraper"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
